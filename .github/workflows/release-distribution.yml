# Copy this file to .github/workflows/release-distribution.yml in each product repo.
# It fires on every GitHub Release and notifies the Distribution Engine.

name: Release Distribution

on:
  release:
    types: [published]

jobs:
  notify-distribution-engine:
    runs-on: ubuntu-latest
    if: "!github.event.release.draft && !github.event.release.prerelease"
    steps:
      - name: Notify Distribution Engine
        run: |
          curl -X POST "${{ secrets.DISTRIBUTION_ENGINE_URL }}/webhooks/github" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: release" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '${{ toJSON(github.event) }}' | openssl dgst -sha256 -hmac '${{ secrets.DISTRIBUTION_ENGINE_WEBHOOK_SECRET }}' | cut -d' ' -f2)" \
            -d '{
              "action": "published",
              "release": {
                "tag_name": "${{ github.event.release.tag_name }}",
                "name": "${{ github.event.release.name }}",
                "body": ${{ toJSON(github.event.release.body) }},
                "html_url": "${{ github.event.release.html_url }}",
                "prerelease": false,
                "draft": false
              },
              "repository": {
                "full_name": "${{ github.repository }}",
                "name": "${{ github.event.repository.name }}",
                "html_url": "${{ github.event.repository.html_url }}"
              }
            }'

      - name: Log
        run: echo "Distribution Engine notified for ${{ github.event.release.tag_name }}"
