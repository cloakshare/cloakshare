name: Publish SDK

on:
  push:
    tags:
      - 'sdk-v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @cloakshare/sdk run build

      - name: Run SDK tests
        run: pnpm --filter @cloakshare/sdk run test

      - name: Publish to npm
        run: pnpm --filter @cloakshare/sdk publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
