app = "cloakshare-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  CLOAK_MODE = "cloud"
  DB_PROVIDER = "sqlite"
  SQLITE_PATH = "/data/cloak.db"
  STORAGE_PROVIDER = "local"
  STORAGE_LOCAL_PATH = "/data/renders"
  API_URL = "https://api.cloakshare.dev"
  VIEWER_URL = "https://view.cloakshare.dev"
  DASHBOARD_URL = "https://app.cloakshare.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "cloakshare_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024
  swap_size_mb = 512
